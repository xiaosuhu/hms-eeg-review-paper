# Repro
seed: 42
deterministic: true

# Data paths
data:
  train_meta: "data_meta_splits/train_test_split.csv"
  val_meta:   "data_meta_splits/train_test_split.csv"
  eeg_dir:    "data_eeg_preprocessed/eeg_npy"
  spec_dir:   "data_eeg_preprocessed/spec_npy"

# Model
model:
  name: "eeg_1d_eegnet"
  num_classes: 6
  in_channels: 8
  dropout_backbone: 0.5
  dropout_head: 0.4

loss:
  name: "ce"           # or "kl"
  class_weight: []
  label_smoothing: 0.0

train:
  run_name: "exp"
  out_dir: "runs"
  batch_size: 64
  num_workers: 8
  epochs: 50
  lr: 1.5e-3
  weight_decay: 0.01
  amp: true
  grad_clip: 1.0
  use_weighted_sampler: false
  early_stop_patience: 10
  early_stop_key: "macro_f1"
  lr_mode: "cos"

log:
  use_wandb: false
  project: "EEG-HBA"
